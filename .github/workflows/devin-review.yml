name: Devin auto-ship review start

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

concurrency:
  group: devin-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions: {}

jobs:
  start:
    runs-on: ubuntu-24.04
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
      checks: write
      statuses: write
    outputs:
      issue_key: ${{ steps.issue_key.outputs.issue_key }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      GITHUB_RUN_ID: ${{ github.run_id }}
      DEVIN_ORG_ID: ${{ vars.DEVIN_ORG_ID }}
      DEVIN_API_TOKEN: ${{ secrets.DEVIN_REVIEWER_KEY }}
      JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL || secrets.JIRA_BASE_URL }}
      JIRA_USER_EMAIL: ${{ vars.JIRA_USER_EMAIL || secrets.JIRA_USER_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Ensure auto-ship labels exist
        env:
          REPO: ${{ github.repository }}
        run: |
          ensure_label() {
            name="$1"
            color="$2"
            description="$3"
            gh label create "$name" --repo "$REPO" --color "$color" --description "$description" 2>/dev/null || true
          }
          ensure_label "automerge:eligible" "0e8a16" "Devin auto-ship: eligible to merge"
          ensure_label "automerge:blocked" "b60205" "Devin auto-ship: policy gate blocked"
          ensure_label "devin-fix-requested" "f9d0c4" "Devin auto-ship: fix requested"
          ensure_label "needs-human" "d93f0b" "Devin auto-ship: escalated to human"

      - name: Extract Jira issue key
        id: issue_key
        run: |
          python3 - <<'PY' > issue_key.txt
          import os, re, sys
          title = os.environ.get('PR_TITLE', '')
          ref = os.environ.get('PR_HEAD_REF', '')
          m = re.search(r'\b([A-Z][A-Z0-9]*-\d+)\b', title)
          if not m and ref:
              m = re.search(r'\b([A-Z][A-Z0-9]*-\d+)\b', ref)
          sys.stdout.write(m.group(1) if m else '')
          PY
          echo "issue_key=$(tr -d '\n' < issue_key.txt)" >> "$GITHUB_OUTPUT"

      - name: No issue key; skip auto-ship
        if: steps.issue_key.outputs.issue_key == ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              context: 'devin-review',
              state: 'success',
              description: 'No Jira issue key; auto-ship review not required.',
            });

      - name: Start Devin reviewer session
        id: start_session
        if: steps.issue_key.outputs.issue_key != ''
        env:
          ISSUE_KEY: ${{ steps.issue_key.outputs.issue_key }}
        run: python3 .github/scripts/review_session.py start

      - name: Post pending devin-review status
        if: steps.issue_key.outputs.issue_key != '' && steps.start_session.outcome == 'success'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              context: 'devin-review',
              state: 'pending',
              description: 'Devin reviewer session started; awaiting verdict comment.',
              target_url: `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Post failure status
        if: failure() && steps.issue_key.outputs.issue_key != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              context: 'devin-review',
              state: 'failure',
              description: 'Failed to start Devin reviewer session.',
              target_url: `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
