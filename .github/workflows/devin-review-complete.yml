name: Devin auto-ship review complete

on:
  issue_comment:
    types: [created]
  # Narrowed from ["*"] to only the workflows that carry merge-gating checks.
  # Firing on every workflow completion produced hundreds of gate invocations a
  # day with heavy concurrency churn, which raised the rate at which GitHub
  # dropped workflow_run deliveries and stranded PRs. The scheduled sweep
  # (devin-review-sweep.yml) is the safety net that heals any missed event, so a
  # too-narrow list here only adds latency, never a permanent stall.
  workflow_run:
    workflows:
      - "E2E"
      - "Playwright Experimental Tests"
      - "Python-Integration"
      - "Python-Unit"
      - "Python Presto/Hive"
      - "Frontend Build CI (unit tests, linting & sanity checks)"
      - "pre-commit checks"
    types: [completed]
  # Invoked per-PR by the scheduled sweep to reconcile a PR whose triggering
  # workflow_run event was never delivered. Same job, same logic — no drift.
  workflow_call:
    inputs:
      pr_number:
        description: "PR number to reconcile directly (sweep/backfill path)."
        required: false
        type: string
        default: ""
      dry_run:
        description: "When true, compute the outcome but take no mutating action."
        required: false
        type: boolean
        default: false

# Serialize per PR: auto-ship PRs are same-repo, so a workflow_run event
# carries pull_requests[0].number, matching issue_comment's PR number and
# placing both event types in one group. (Fork runs, which lack that field,
# would share an empty-suffixed group — harmless over-serialization.) The
# workflow_call path keys the group on the explicit pr_number input.
concurrency:
  group: devin-review-complete-${{ inputs.pr_number || github.event.issue.number || github.event.workflow_run.pull_requests[0].number }}
  cancel-in-progress: false

permissions: {}

jobs:
  complete:
    runs-on: ubuntu-24.04
    # Re-run on both the reviewer verdict comment and any CI workflow finishing
    # for a PR head, then reconcile the current state. Ordering does not matter:
    # whichever input settles last triggers the check that lets the gate proceed.
    if: >
      inputs.pr_number != '' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '### Devin review verdict')) ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.event == 'pull_request')
    permissions:
      contents: write
      pull-requests: write
      checks: write
      statuses: write
      issues: write
    outputs:
      result: ${{ steps.outcome.outputs.result }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      REPO: ${{ github.repository }}
      ALLOWED_COMMENTERS: ${{ vars.DEVIN_REVIEWER_LOGINS || 'github-actions[bot],devin-ai-integration[bot]' }}
      DEVIN_ORG_ID: ${{ vars.DEVIN_ORG_ID }}
      DEVIN_API_TOKEN: ${{ secrets.DEVIN_REVIEWER_KEY }}
      JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL || secrets.JIRA_BASE_URL }}
      JIRA_USER_EMAIL: ${{ vars.JIRA_USER_EMAIL || secrets.JIRA_USER_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Reconcile verdict and CI status
        id: rc
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          IS_PULL_REQUEST: ${{ github.event.issue.pull_request != null }}
          WF_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          WF_PULL_REQUESTS: ${{ toJSON(github.event.workflow_run.pull_requests) }}
        run: python3 .github/scripts/review_reconcile.py

      - name: Run deterministic policy gate
        id: policy
        if: >
          steps.rc.outputs.pr_number != '' &&
          steps.rc.outputs.has_verdict == 'true' &&
          steps.rc.outputs.stale != 'true' &&
          steps.rc.outputs.verdict == 'approve' &&
          steps.rc.outputs.ci_status == 'success'
        env:
          PR_NUMBER: ${{ steps.rc.outputs.pr_number }}
          PR_NODE_ID: ${{ steps.rc.outputs.node_id }}
          DEVIN_VERDICT: verdict.json
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if python3 .github/scripts/policy.py; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for policy-bot app
        id: bot_config
        if: >
          steps.rc.outputs.has_verdict == 'true' &&
          steps.rc.outputs.stale != 'true'
        env:
          POLICY_BOT_APP_ID: ${{ secrets.POLICY_BOT_APP_ID }}
          POLICY_BOT_APP_PRIVATE_KEY: ${{ secrets.POLICY_BOT_APP_PRIVATE_KEY }}
        run: |
          if [ -n "$POLICY_BOT_APP_ID" ] && [ -n "$POLICY_BOT_APP_PRIVATE_KEY" ]; then
            echo "has_policy_bot=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_policy_bot=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate policy-bot approval token
        id: bot-token
        if: steps.bot_config.outputs.has_policy_bot == 'true'
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.POLICY_BOT_APP_ID }}
          private-key: ${{ secrets.POLICY_BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write

      - name: Approve and enable auto-merge
        id: approve
        # 'escalated != true' is a hard stop: once a PR carries needs-human,
        # a later approve verdict must not silently re-approve/auto-merge it.
        # Auto-ship resumes only after a human removes the label.
        if: >
          inputs.dry_run != true &&
          steps.rc.outputs.has_verdict == 'true' &&
          steps.rc.outputs.stale != 'true' &&
          steps.rc.outputs.verdict == 'approve' &&
          steps.rc.outputs.ci_status == 'success' &&
          steps.rc.outputs.escalated != 'true' &&
          steps.policy.outputs.result == 'pass'
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.rc.outputs.pr_number }}
        run: |
          # Idempotent for the repeated triggers and the periodic sweep: only
          # submit a fresh approval when this auto-ship gate has not already
          # approved the PR (marker text uniquely identifies our review), then
          # (re-)enable auto-merge, which is a no-op once already enabled.
          # Emit one line per matching review and count with wc, so the count is
          # correct across --paginate pages (per-page `| length` would print one
          # integer per page). Coalesce a null body to "" before test().
          approved=$(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/reviews" \
            --jq '.[] | select(.state == "APPROVED") | select((.body // "") | test("approved by auto-ship"))' 2>/dev/null | wc -l | tr -d ' ')
          if [ "${approved:-0}" -gt 0 ]; then
            echo "Auto-ship approval already present; skipping duplicate review."
          else
            gh pr review "$PR_NUMBER" --repo "$REPO" --approve --body "Auto-ship policy gate passed — approved by auto-ship." || true
          fi
          gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --squash || true

      - name: Request changes
        if: >
          inputs.dry_run != true &&
          steps.rc.outputs.has_verdict == 'true' &&
          steps.rc.outputs.stale != 'true' &&
          steps.rc.outputs.verdict == 'request_changes'
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.rc.outputs.pr_number }}
        run: |
          # Idempotent across the repeated triggers: if the fix has already been
          # requested for this head, don't re-label/re-comment on each CI event.
          if gh pr view "$PR_NUMBER" --repo "$REPO" --json labels -q '.labels[].name' | grep -qx "devin-fix-requested"; then
            echo "Changes already requested; skipping duplicate notification."
            exit 0
          fi
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "devin-fix-requested" --remove-label "automerge:eligible" || true
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "Devin reviewer requested changes; fix session has been triggered."

      - name: Escalate to human review
        if: >
          inputs.dry_run != true &&
          steps.rc.outputs.has_verdict == 'true' &&
          steps.rc.outputs.stale != 'true' &&
          steps.rc.outputs.verdict == 'needs_human'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.rc.outputs.pr_number }}
          ISSUE_KEY: ${{ steps.rc.outputs.issue_key }}
          PR_URL: https://github.com/${{ github.repository }}/pull/${{ steps.rc.outputs.pr_number }}
        run: |
          python3 - <<'PY'
          import json, os, subprocess, sys, urllib.request

          REPO = os.environ['REPO']
          PR_NUMBER = os.environ['PR_NUMBER']
          ISSUE_KEY = os.environ.get('ISSUE_KEY', '')
          REASON = "Auto-ship review stopped: Reviewer escalated this PR to human review."

          def gh(args):
              subprocess.run(['gh', 'pr'] + args + ['--repo', REPO], check=False)

          def already_escalated():
              proc = subprocess.run(
                  ['gh', 'pr', 'view', PR_NUMBER, '--repo', REPO, '--json', 'labels', '-q', '.labels[].name'],
                  capture_output=True, text=True, check=False,
              )
              return 'needs-human' in proc.stdout.split()

          if already_escalated():
              print('PR already labelled needs-human; skipping duplicate notification.')
              raise SystemExit(0)

          gh(['edit', PR_NUMBER, '--add-label', 'needs-human', '--remove-label', 'devin-fix-requested', '--remove-label', 'automerge:eligible'])
          gh(['comment', PR_NUMBER, '--body', REASON])

          webhook = os.environ.get('SLACK_WEBHOOK_URL')
          if webhook:
              body = json.dumps({'text': f"{REASON}\n<{os.environ.get('PR_URL', '')}|PR #{PR_NUMBER}>"})
              req = urllib.request.Request(
                  webhook,
                  data=body.encode(),
                  headers={'Content-Type': 'application/json'},
              )
              try:
                  urllib.request.urlopen(req, timeout=30)
              except Exception as exc:
                  print(f"Slack notify failed: {exc}", file=sys.stderr)

          if ISSUE_KEY and os.environ.get('JIRA_BASE_URL'):
              subprocess.run([
                  'python3', '.github/scripts/jira_transition.py', ISSUE_KEY, 'Backlog', REASON,
              ], check=False)
          PY

      - name: Escalate on policy failure
        if: >
          inputs.dry_run != true &&
          steps.rc.outputs.has_verdict == 'true' &&
          steps.rc.outputs.stale != 'true' &&
          steps.rc.outputs.verdict == 'approve' &&
          steps.rc.outputs.ci_status == 'success' &&
          steps.policy.outputs.result == 'fail'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.rc.outputs.pr_number }}
          ISSUE_KEY: ${{ steps.rc.outputs.issue_key }}
          PR_URL: https://github.com/${{ github.repository }}/pull/${{ steps.rc.outputs.pr_number }}
          POLICY_REASON: ${{ steps.policy.outputs.policy_reason }}
        run: |
          python3 - <<'PY'
          import json, os, subprocess, sys, urllib.request

          REPO = os.environ['REPO']
          PR_NUMBER = os.environ['PR_NUMBER']
          ISSUE_KEY = os.environ.get('ISSUE_KEY', '')
          POLICY_REASON = os.environ.get('POLICY_REASON', '').strip()
          REASON = "Auto-ship review stopped: Reviewer approved but the deterministic policy gate failed."
          COMMENT = f"{REASON}\n\nPolicy gate detail: {POLICY_REASON}" if POLICY_REASON else f"{REASON}\n\nNo further reason was captured from the policy gate."
          SLACK_REASON = f"{REASON} ({POLICY_REASON})" if POLICY_REASON else REASON

          def gh(args):
              subprocess.run(['gh', 'pr'] + args + ['--repo', REPO], check=False)

          def already_escalated():
              proc = subprocess.run(
                  ['gh', 'pr', 'view', PR_NUMBER, '--repo', REPO, '--json', 'labels', '-q', '.labels[].name'],
                  capture_output=True, text=True, check=False,
              )
              return 'needs-human' in proc.stdout.split()

          if already_escalated():
              print('PR already labelled needs-human; skipping duplicate notification.')
              raise SystemExit(0)

          gh(['edit', PR_NUMBER, '--add-label', 'needs-human', '--remove-label', 'devin-fix-requested', '--remove-label', 'automerge:eligible'])
          gh(['comment', PR_NUMBER, '--body', COMMENT])

          webhook = os.environ.get('SLACK_WEBHOOK_URL')
          if webhook:
              body = json.dumps({'text': f"{SLACK_REASON}\n<{os.environ.get('PR_URL', '')}|PR #{PR_NUMBER}>"})
              req = urllib.request.Request(
                  webhook,
                  data=body.encode(),
                  headers={'Content-Type': 'application/json'},
              )
              try:
                  urllib.request.urlopen(req, timeout=30)
              except Exception as exc:
                  print(f"Slack notify failed: {exc}", file=sys.stderr)

          if ISSUE_KEY and os.environ.get('JIRA_BASE_URL'):
              jira_reason = f"{REASON} - {POLICY_REASON}" if POLICY_REASON else REASON
              subprocess.run([
                  'python3', '.github/scripts/jira_transition.py', ISSUE_KEY, 'Backlog', jira_reason,
              ], check=False)
          PY

      - name: Escalate on CI failure
        if: >
          inputs.dry_run != true &&
          steps.rc.outputs.has_verdict == 'true' &&
          steps.rc.outputs.stale != 'true' &&
          steps.rc.outputs.verdict == 'approve' &&
          steps.rc.outputs.ci_status == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.rc.outputs.pr_number }}
          ISSUE_KEY: ${{ steps.rc.outputs.issue_key }}
          PR_URL: https://github.com/${{ github.repository }}/pull/${{ steps.rc.outputs.pr_number }}
        run: |
          python3 - <<'PY'
          import json, os, subprocess, sys, urllib.request

          REPO = os.environ['REPO']
          PR_NUMBER = os.environ['PR_NUMBER']
          ISSUE_KEY = os.environ.get('ISSUE_KEY', '')
          REASON = "Auto-ship review stopped: Reviewer approved but a required CI check failed."

          def gh(args):
              subprocess.run(['gh', 'pr'] + args + ['--repo', REPO], check=False)

          def already_escalated():
              proc = subprocess.run(
                  ['gh', 'pr', 'view', PR_NUMBER, '--repo', REPO, '--json', 'labels', '-q', '.labels[].name'],
                  capture_output=True, text=True, check=False,
              )
              return 'needs-human' in proc.stdout.split()

          if already_escalated():
              print('PR already labelled needs-human; skipping duplicate notification.')
              raise SystemExit(0)

          gh(['edit', PR_NUMBER, '--add-label', 'needs-human', '--remove-label', 'devin-fix-requested', '--remove-label', 'automerge:eligible'])
          gh(['comment', PR_NUMBER, '--body', f"{REASON}\n\nThe deterministic gate was not evaluated because required checks are not green; a human should review the failing checks."])

          webhook = os.environ.get('SLACK_WEBHOOK_URL')
          if webhook:
              body = json.dumps({'text': f"{REASON}\n<{os.environ.get('PR_URL', '')}|PR #{PR_NUMBER}>"})
              req = urllib.request.Request(
                  webhook,
                  data=body.encode(),
                  headers={'Content-Type': 'application/json'},
              )
              try:
                  urllib.request.urlopen(req, timeout=30)
              except Exception as exc:
                  print(f"Slack notify failed: {exc}", file=sys.stderr)

          if ISSUE_KEY and os.environ.get('JIRA_BASE_URL'):
              subprocess.run([
                  'python3', '.github/scripts/jira_transition.py', ISSUE_KEY, 'Backlog', REASON,
              ], check=False)
          PY

      - name: Determine outcome label
        id: outcome
        if: always()
        env:
          HAS_VERDICT: ${{ steps.rc.outputs.has_verdict }}
          STALE: ${{ steps.rc.outputs.stale }}
          VERDICT: ${{ steps.rc.outputs.verdict }}
          CI: ${{ steps.rc.outputs.ci_status }}
          GATE: ${{ steps.policy.outputs.result }}
          ESCALATED: ${{ steps.rc.outputs.escalated }}
        run: |
          # An existing needs-human escalation dominates: keep the outcome (and
          # thus the devin-review status) as needs_human so a later approve
          # verdict can't flip the gate check back to green behind a human.
          if [ "$ESCALATED" = "true" ]; then
            echo "result=needs_human" >> "$GITHUB_OUTPUT"
          elif [ "$STALE" = "true" ]; then
            echo "result=stale" >> "$GITHUB_OUTPUT"
          elif [ "$HAS_VERDICT" != "true" ]; then
            echo "result=waiting" >> "$GITHUB_OUTPUT"
          elif [ "$VERDICT" = "request_changes" ]; then
            echo "result=request_changes" >> "$GITHUB_OUTPUT"
          elif [ "$VERDICT" = "needs_human" ]; then
            echo "result=needs_human" >> "$GITHUB_OUTPUT"
          elif [ "$VERDICT" = "approve" ] && [ "$CI" = "pending" ]; then
            echo "result=waiting" >> "$GITHUB_OUTPUT"
          elif [ "$VERDICT" = "approve" ] && [ "$CI" = "success" ] && [ "$GATE" = "pass" ]; then
            echo "result=approved" >> "$GITHUB_OUTPUT"
          elif [ "$VERDICT" = "approve" ] && [ "$CI" = "success" ] && [ "$GATE" != "pass" ]; then
            echo "result=policy_failed" >> "$GITHUB_OUTPUT"
          elif [ "$VERDICT" = "approve" ] && [ "$CI" = "failure" ]; then
            echo "result=ci_failed" >> "$GITHUB_OUTPUT"
          else
            echo "result=waiting" >> "$GITHUB_OUTPUT"
          fi

      - name: Dry-run summary
        if: always() && inputs.dry_run == true
        env:
          OUTCOME: ${{ steps.outcome.outputs.result }}
          PR_NUMBER: ${{ steps.rc.outputs.pr_number }}
        run: |
          echo "[dry-run] PR #$PR_NUMBER computed outcome: '$OUTCOME' — no status posted, no action taken."

      - name: Post devin-review status
        if: always() && inputs.dry_run != true && steps.rc.outputs.head_sha != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SHA: ${{ steps.rc.outputs.head_sha }}
          OUTCOME: ${{ steps.outcome.outputs.result }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          POLICY_REASON: ${{ steps.policy.outputs.policy_reason || '' }}
        with:
          script: |
            const sha = process.env.SHA;
            const outcome = process.env.OUTCOME;
            const policyReason = (process.env.POLICY_REASON || '').trim();

            // Leave the head's status untouched while waiting for the verdict
            // or CI to settle. 'stale' means the verdict was for an older
            // commit and the current head is unreviewed, so we must NOT mark it
            // success — leaving the pending status that devin-review.yml sets on
            // each new head forces a fresh review before it can merge.
            if (outcome === 'waiting' || outcome === 'stale') {
              console.log(`Outcome '${outcome}': leaving head status unchanged`);
              return;
            }

            let state = 'failure';
            let description = 'Devin review did not complete successfully.';

            switch (outcome) {
              case 'approved':
                state = 'success';
                description = 'Reviewer approved and policy gate passed.';
                break;
              case 'request_changes':
                state = 'failure';
                description = 'Reviewer requested changes.';
                break;
              case 'needs_human':
                state = 'failure';
                description = 'Reviewer escalated to human review.';
                break;
              case 'policy_failed':
                state = 'failure';
                description = (policyReason ? `Policy failed: ${policyReason}` : 'Reviewer approved but policy gate failed.')
                  .substring(0, 140);
                break;
              case 'ci_failed':
                state = 'failure';
                description = 'Reviewer approved but CI failed.';
                break;
            }

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              context: 'devin-review',
              state,
              description,
              target_url: process.env.TARGET_URL,
            });
